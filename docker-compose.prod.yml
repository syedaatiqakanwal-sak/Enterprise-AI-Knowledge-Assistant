# Production stack — no host mounts for app code; Nginx edge proxy
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: eai_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-ghcr.io/example}/eai-backend:${IMAGE_TAG:-0.12.0}
    container_name: eai_backend
    restart: always
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
      LOG_JSON: "true"
    volumes:
      - backend_logs:/app/logs
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - ai_network
    expose:
      - "8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    image: ${IMAGE_REGISTRY:-ghcr.io/example}/eai-worker:${IMAGE_TAG:-0.12.0}
    container_name: eai_worker
    restart: always
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
      LOG_JSON: "true"
    depends_on:
      - backend
    networks:
      - ai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-}
    image: ${IMAGE_REGISTRY:-ghcr.io/example}/eai-frontend:${IMAGE_TAG:-0.12.0}
    container_name: eai_frontend
    restart: always
    networks:
      - ai_network
    expose:
      - "80"

  postgres:
    image: postgres:16-alpine
    container_name: eai_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai_network

  mongodb:
    image: mongo:7.0
    container_name: eai_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai_network

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: eai_qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_network

  redis:
    image: redis:7.2-alpine
    container_name: eai_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - ai_network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: eai_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    networks:
      - ai_network
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: eai_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - ai_network
    expose:
      - "3000"

networks:
  ai_network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  qdrant_data:
  redis_data:
  backend_logs:
  backend_storage:
  prometheus_data:
  grafana_data:
  certbot_www:
