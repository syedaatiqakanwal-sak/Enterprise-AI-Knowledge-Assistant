apiVersion: v1
kind: Namespace
metadata:
  name: enterprise-ai
  labels:
    app.kubernetes.io/part-of: enterprise-ai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eai-config
  namespace: enterprise-ai
data:
  ENVIRONMENT: "production"
  LOG_JSON: "true"
  LOG_LEVEL: "INFO"
  PROJECT_VERSION: "0.12.0"
  API_V1_STR: "/api/v1"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "enterprise_ai"
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  MONGO_DB: "enterprise_ai_logs"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  METRICS_ENABLED: "true"
  SECURITY_HEADERS_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  TENANCY_ENABLED: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: eai-secrets
  namespace: enterprise-ai
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_LONG_RANDOM_SECRET"
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql+asyncpg://admin:REPLACE_ME@postgres:5432/enterprise_ai"
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "REPLACE_ME"
  MONGO_URL: "mongodb://admin:REPLACE_ME@mongodb:27017"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_PASSWORD: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: enterprise-ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: enterprise-ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: enterprise-ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 30Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: enterprise-ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-storage-pvc
  namespace: enterprise-ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi
