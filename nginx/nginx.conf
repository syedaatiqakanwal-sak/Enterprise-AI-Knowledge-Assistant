# Edge reverse proxy — HTTPS-ready (Module 12)
# Mount TLS certs at /etc/nginx/certs/{fullchain.pem,privkey.pem} for production TLS.
# Let's Encrypt: use certbot sidecar or external ingress controller.

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
}

# Redirect HTTP → HTTPS when TLS is enabled (uncomment ssl server block)
server {
    listen 80;
    server_name _;

    # ACME challenge placeholder for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # For local/prod-compose without TLS yet, proxy directly.
    # In hardened prod, replace this with: return 301 https://$host$request_uri;
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        client_max_body_size 100m;
        proxy_read_timeout 120s;
    }

    location /live {
        proxy_pass http://backend_upstream/live;
    }
    location /ready {
        proxy_pass http://backend_upstream/ready;
    }
    location /health {
        proxy_pass http://backend_upstream/health;
    }
    location /metrics {
        proxy_pass http://backend_upstream/metrics;
        # Restrict in production via allow/deny or NetworkPolicy
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

