# Development stack — hot reload, exposed DB ports
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: eai_backend_dev
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      LOG_JSON: "false"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    networks:
      - ai_network
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: eai_worker_dev
    restart: unless-stopped
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
    depends_on:
      - backend
    networks:
      - ai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eai_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - ai_network

  postgres:
    image: postgres:16-alpine
    container_name: eai_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ai_network

  mongodb:
    image: mongo:7.0
    container_name: eai_mongodb_dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai_network

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: eai_qdrant_dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_network

  redis:
    image: redis:7.2-alpine
    container_name: eai_redis_dev
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  qdrant_data:
  redis_data:
  backend_logs:
